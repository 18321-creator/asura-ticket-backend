<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asura Shop Gateway</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #0f0f1a; color: #fff; font-family: 'Mitr', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .login-card {
            background: #11111b; border: 1px solid #313244; padding: 50px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); width: 450px;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #b4befe; }
        p { color: #a6adc8; font-size: 14px; margin-bottom: 35px; }
        .btn-discord {
            background: #5865f2; color: white; border: none; padding: 16px 32px; font-size: 16px; font-weight: 600; border-radius: 8px; cursor: pointer; display: inline-flex; align-items: center; gap: 12px; transition: 0.2s; width: 100%; justify-content: center; box-shadow: 0 4px 15px rgba(88,101,242,0.3);
        }
        .btn-discord:hover {
            background: #4752c4; transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div style="font-size: 60px; color: #5865f2; margin-bottom: 20px;"><i class="fa-brands fa-discord"></i></div>
        <h1>แผงควบคุมตั๋วพรีเมียม</h1>
        <p>กรุณายืนยันตัวตนแอดมินด้วยบัญชี Discord เพื่อเข้าจัดการโครงสร้างหลังบ้านระบบห้องสแต็คตั๋ว</p>
        <button class="btn-discord" id="loginBtn"><i class="fa-solid fa-key"></i> ล็อกอินด้วยบัญชี Discord</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
